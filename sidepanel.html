<!DOCTYPE html>
<html>

<head>
  <title>NEWSEE</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }

    .centered-panel {
      width: 360px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    iframe {
      border: none;
      width: 360px;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div class="centered-panel">
    <iframe src="http://localhost:3000"></iframe>
  </div>
</body>

</html>
